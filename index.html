<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>像素风机甲对战</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }

        h1 {
            color: #ff6b6b;
            text-shadow: 0 0 10px rgba(255, 107, 107, 0.5);
            margin-bottom: 20px;
            font-size: 2.5rem;
            letter-spacing: 4px;
        }

        .game-container {
            position: relative;
            border: 4px solid #4a4a6a;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(74, 74, 106, 0.3);
        }

        canvas {
            display: block;
            image-rendering: pixelated;
        }

        .ui-overlay {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: none;
        }

        .player-info {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .player-info.left {
            align-items: flex-start;
        }

        .player-info.right {
            align-items: flex-end;
        }

        .player-name {
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .player-name.p1 {
            color: #ff6b6b;
            text-shadow: 0 0 8px rgba(255, 107, 107, 0.8);
        }

        .player-name.p2 {
            color: #4ecdc4;
            text-shadow: 0 0 8px rgba(78, 205, 196, 0.8);
        }

        .hp-bar-container {
            width: 150px;
            height: 20px;
            background: #2d2d44;
            border: 2px solid #4a4a6a;
            border-radius: 4px;
            overflow: hidden;
        }

        .hp-bar {
            height: 100%;
            transition: width 0.2s ease;
        }

        .hp-bar.p1 {
            background: linear-gradient(90deg, #ff4757, #ff6b6b);
        }

        .hp-bar.p2 {
            background: linear-gradient(90deg, #4ecdc4, #1dd1a1);
        }

        .hp-text {
            font-size: 0.9rem;
            color: #fff;
            font-weight: bold;
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.85);
            padding: 40px 60px;
            border: 4px solid #ff6b6b;
            border-radius: 12px;
            text-align: center;
            display: none;
            box-shadow: 0 0 50px rgba(255, 107, 107, 0.5);
        }

        .game-over.show {
            display: block;
            animation: pulse 0.5s ease-in-out;
        }

        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.1); }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        .game-over-title {
            font-size: 2.5rem;
            color: #ff6b6b;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 107, 107, 0.8);
        }

        .winner-name {
            font-size: 1.5rem;
            color: #fff;
            margin-bottom: 30px;
        }

        .restart-btn {
            background: linear-gradient(180deg, #ff6b6b, #ff4757);
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            color: #fff;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
        }

        .restart-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 107, 107, 0.6);
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 40px;
            color: #ccc;
            font-size: 0.9rem;
        }

        .control-panel {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px 25px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .control-panel h3 {
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .control-panel.p1 h3 {
            color: #ff6b6b;
        }

        .control-panel.p2 h3 {
            color: #4ecdc4;
        }

        .control-item {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin: 5px 0;
        }

        .key {
            background: #3a3a5a;
            padding: 3px 8px;
            border-radius: 4px;
            border: 1px solid #5a5a7a;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <h1>MECHA ARENA</h1>
    
    <div class="game-container">
        <canvas id="gameCanvas" width="800" height="500"></canvas>
        
        <div class="ui-overlay">
            <div class="player-info left">
                <div class="player-name p1">PLAYER 1</div>
                <div class="hp-bar-container">
                    <div class="hp-bar p1" id="hpBar1" style="width: 100%"></div>
                </div>
                <div class="hp-text" id="hpText1">HP: 100</div>
            </div>
            
            <div class="player-info right">
                <div class="player-name p2">PLAYER 2</div>
                <div class="hp-bar-container">
                    <div class="hp-bar p2" id="hpBar2" style="width: 100%"></div>
                </div>
                <div class="hp-text" id="hpText2">HP: 100</div>
            </div>
        </div>
        
        <div class="game-over" id="gameOver">
            <div class="game-over-title">GAME OVER</div>
            <div class="winner-name" id="winnerName"></div>
            <button class="restart-btn" onclick="restartGame()">PLAY AGAIN</button>
        </div>
    </div>
    
    <div class="controls">
        <div class="control-panel p1">
            <h3>Player 1</h3>
            <div class="control-item"><span>移动</span><span><span class="key">A</span> <span class="key">D</span></span></div>
            <div class="control-item"><span>跳跃</span><span><span class="key">W</span></span></div>
            <div class="control-item"><span>攻击</span><span><span class="key">J</span></span></div>
            <div class="control-item"><span>防御</span><span><span class="key">K</span></span></div>
        </div>
        
        <div class="control-panel p2">
            <h3>Player 2</h3>
            <div class="control-item"><span>移动</span><span><span class="key">←</span> <span class="key">→</span></span></div>
            <div class="control-item"><span>跳跃</span><span><span class="key">↑</span></span></div>
            <div class="control-item"><span>攻击</span><span><span class="key">Enter</span></span></div>
            <div class="control-item"><span>防御</span><span><span class="key">Shift</span></span></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const hpBar1 = document.getElementById('hpBar1');
        const hpBar2 = document.getElementById('hpBar2');
        const hpText1 = document.getElementById('hpText1');
        const hpText2 = document.getElementById('hpText2');
        const gameOver = document.getElementById('gameOver');
        const winnerName = document.getElementById('winnerName');

        const GROUND_Y = canvas.height - 80;
        const GRAVITY = 0.8;
        const JUMP_FORCE = -15;
        const MOVE_SPEED = 5;
        const ATTACK_RANGE = 60;
        const ATTACK_DAMAGE = 10;
        const ATTACK_COOLDOWN = 500;
        const DEFENSE_REDUCE = 0.5;

        const KEYS = {
            p1: {
                left: 'KeyA',
                right: 'KeyD',
                jump: 'KeyW',
                attack: 'KeyJ',
                defense: 'KeyK'
            },
            p2: {
                left: 'ArrowLeft',
                right: 'ArrowRight',
                jump: 'ArrowUp',
                attack: 'Enter',
                defense: 'ShiftLeft'
            }
        };

        const pressedKeys = {};

        class Mecha {
            constructor(x, y, color, playerId) {
                this.x = x;
                this.y = y;
                this.width = 50;
                this.height = 80;
                this.color = color;
                this.playerId = playerId;
                this.hp = 100;
                this.maxHp = 100;
                
                this.velocityX = 0;
                this.velocityY = 0;
                this.isOnGround = false;
                this.facingRight = playerId === 1;
                
                this.state = 'idle';
                this.animationFrame = 0;
                this.animationTimer = 0;
                
                this.lastAttackTime = 0;
                this.isAttacking = false;
                this.isDefending = false;
            }

            update(otherMecha) {
                this.handleInput();
                this.applyPhysics();
                this.checkCollision(otherMecha);
                this.updateAnimation();
            }

            handleInput() {
                const keys = KEYS[`p${this.playerId}`];
                
                if (this.isDefending) {
                    if (!pressedKeys[keys.defense]) {
                        this.isDefending = false;
                        this.state = 'idle';
                    }
                    return;
                }

                if (this.isAttacking) return;

                this.velocityX = 0;

                if (pressedKeys[keys.left]) {
                    this.velocityX = -MOVE_SPEED;
                    this.facingRight = false;
                    this.state = 'run';
                } else if (pressedKeys[keys.right]) {
                    this.velocityX = MOVE_SPEED;
                    this.facingRight = true;
                    this.state = 'run';
                } else {
                    this.state = 'idle';
                }

                if (pressedKeys[keys.jump] && this.isOnGround) {
                    this.velocityY = JUMP_FORCE;
                    this.isOnGround = false;
                    this.state = 'jump';
                }

                if (pressedKeys[keys.attack]) {
                    this.attack();
                }

                if (pressedKeys[keys.defense]) {
                    this.defend();
                }
            }

            applyPhysics() {
                this.velocityY += GRAVITY;
                this.x += this.velocityX;
                this.y += this.velocityY;

                if (this.x < 0) this.x = 0;
                if (this.x > canvas.width - this.width) this.x = canvas.width - this.width;

                if (this.y >= GROUND_Y - this.height) {
                    this.y = GROUND_Y - this.height;
                    this.velocityY = 0;
                    this.isOnGround = true;
                    if (this.state === 'jump') {
                        this.state = 'idle';
                    }
                }
            }

            checkCollision(otherMecha) {
                if (this.x < otherMecha.x + otherMecha.width &&
                    this.x + this.width > otherMecha.x &&
                    this.y < otherMecha.y + otherMecha.height &&
                    this.y + this.height > otherMecha.y) {
                    
                    if (this.velocityX > 0) {
                        this.x = otherMecha.x - this.width;
                    } else if (this.velocityX < 0) {
                        this.x = otherMecha.x + otherMecha.width;
                    }
                }
            }

            attack() {
                const now = Date.now();
                if (now - this.lastAttackTime < ATTACK_COOLDOWN) return;
                
                this.lastAttackTime = now;
                this.isAttacking = true;
                this.state = 'attack';
                this.animationFrame = 0;

                setTimeout(() => {
                    this.isAttacking = false;
                    this.state = 'idle';
                }, 300);
            }

            defend() {
                this.isDefending = true;
                this.state = 'defense';
            }

            takeDamage(damage) {
                if (this.isDefending) {
                    damage *= DEFENSE_REDUCE;
                }
                this.hp = Math.max(0, this.hp - damage);
                this.updateUI();
                
                if (this.hp <= 0) {
                    this.state = 'death';
                }
            }

            updateUI() {
                const hpPercent = (this.hp / this.maxHp) * 100;
                if (this.playerId === 1) {
                    hpBar1.style.width = `${hpPercent}%`;
                    hpText1.textContent = `HP: ${Math.ceil(this.hp)}`;
                } else {
                    hpBar2.style.width = `${hpPercent}%`;
                    hpText2.textContent = `HP: ${Math.ceil(this.hp)}`;
                }
            }

            updateAnimation() {
                this.animationTimer++;
                if (this.animationTimer >= 8) {
                    this.animationTimer = 0;
                    this.animationFrame = (this.animationFrame + 1) % 4;
                }
            }

            draw(ctx) {
                ctx.save();
                
                if (!this.facingRight) {
                    ctx.translate(this.x + this.width, 0);
                    ctx.scale(-1, 1);
                    ctx.translate(-this.x, 0);
                }

                this.drawBody(ctx);
                this.drawArms(ctx);
                this.drawLegs(ctx);

                ctx.restore();
            }

            drawBody(ctx) {
                const cx = this.x + this.width / 2;
                const cy = this.y + this.height / 2;

                ctx.fillStyle = this.color;
                
                ctx.fillRect(this.x + 10, this.y + 5, 30, 20);
                
                ctx.fillRect(this.x + 8, this.y + 25, 34, 35);
                
                ctx.fillStyle = '#333';
                ctx.fillRect(this.x + 18, this.y + 12, 6, 6);
                ctx.fillRect(this.x + 26, this.y + 12, 6, 6);
                
                ctx.fillStyle = '#fff';
                ctx.fillRect(this.x + 20, this.y + 14, 2, 2);
                ctx.fillRect(this.x + 28, this.y + 14, 2, 2);
            }

            drawArms(ctx) {
                const cx = this.x + this.width / 2;
                const cy = this.y + this.height / 2;

                ctx.fillStyle = this.color;

                if (this.state === 'attack') {
                    const attackFrame = this.animationFrame % 2;
                    if (attackFrame === 0) {
                        ctx.fillRect(this.x - 10, this.y + 30, 20, 8);
                        ctx.fillRect(this.x - 5, this.y + 38, 10, 25);
                    } else {
                        ctx.fillRect(this.x + 20, this.y + 25, 25, 8);
                        ctx.fillRect(this.x + 35, this.y + 20, 15, 8);
                    }
                } else if (this.state === 'defense') {
                    ctx.fillRect(this.x - 5, this.y + 25, 15, 8);
                    ctx.fillRect(this.x + 40, this.y + 25, 15, 8);
                    
                    ctx.fillStyle = '#666';
                    ctx.fillRect(this.x + 10, this.y + 20, 30, 25);
                } else {
                    const armOffset = Math.sin(this.animationTimer * 0.5) * 3;
                    ctx.fillRect(this.x - 8, this.y + 30 + armOffset, 18, 8);
                    ctx.fillRect(this.x + 40, this.y + 30 - armOffset, 18, 8);
                    
                    ctx.fillRect(this.x - 3, this.y + 38 + armOffset, 8, 20);
                    ctx.fillRect(this.x + 45, this.y + 38 - armOffset, 8, 20);
                }
            }

            drawLegs(ctx) {
                const legOffset = this.state === 'run' ? Math.sin(this.animationTimer * 0.8) * 8 : 0;
                
                ctx.fillStyle = this.color;
                
                if (this.state === 'jump') {
                    ctx.fillRect(this.x + 12, this.y + 60, 10, 20);
                    ctx.fillRect(this.x + 28, this.y + 60, 10, 20);
                } else if (this.state === 'death') {
                    ctx.fillRect(this.x + 12, this.y + 70, 10, 10);
                    ctx.fillRect(this.x + 28, this.y + 70, 10, 10);
                } else {
                    ctx.fillRect(this.x + 12, this.y + 60 + legOffset, 10, 20);
                    ctx.fillRect(this.x + 28, this.y + 60 - legOffset, 10, 20);
                }
                
                ctx.fillStyle = '#333';
                ctx.fillRect(this.x + 10, this.y + 78, 14, 5);
                ctx.fillRect(this.x + 26, this.y + 78, 14, 5);
            }
        }

        function drawBackground() {
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#1a1a2e');
            gradient.addColorStop(1, '#16213e');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            drawStars();
            drawGround();
            drawBuildings();
        }

        function drawStars() {
            ctx.fillStyle = '#fff';
            for (let i = 0; i < 50; i++) {
                const x = (i * 17) % canvas.width;
                const y = (i * 23) % (GROUND_Y - 50);
                const size = (i % 3) + 1;
                const twinkle = Math.sin(Date.now() / 500 + i) * 0.5 + 0.5;
                ctx.globalAlpha = 0.3 + twinkle * 0.7;
                ctx.fillRect(x, y, size, size);
            }
            ctx.globalAlpha = 1;
        }

        function drawGround() {
            ctx.fillStyle = '#2d2d44';
            ctx.fillRect(0, GROUND_Y, canvas.width, canvas.height - GROUND_Y);

            ctx.fillStyle = '#3a3a5a';
            for (let i = 0; i < canvas.width; i += 40) {
                ctx.fillRect(i, GROUND_Y, 20, 5);
            }

            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, GROUND_Y + 5, canvas.width, 10);
        }

        function drawBuildings() {
            const buildings = [
                { x: 20, width: 60, height: 120, color: '#2a2a4a' },
                { x: 100, width: 80, height: 180, color: '#3a3a5a' },
                { x: 200, width: 50, height: 100, color: '#2a2a4a' },
                { x: 550, width: 70, height: 150, color: '#3a3a5a' },
                { x: 640, width: 90, height: 200, color: '#2a2a4a' },
                { x: 750, width: 40, height: 80, color: '#3a3a5a' }
            ];

            buildings.forEach(building => {
                ctx.fillStyle = building.color;
                ctx.fillRect(building.x, GROUND_Y - building.height, building.width, building.height);

                ctx.fillStyle = '#1a1a2e';
                for (let y = GROUND_Y - building.height + 15; y < GROUND_Y - 10; y += 30) {
                    for (let x = building.x + 10; x < building.x + building.width - 10; x += 20) {
                        ctx.fillRect(x, y, 8, 12);
                    }
                }

                ctx.fillStyle = '#ff9f43';
                for (let y = GROUND_Y - building.height + 20; y < GROUND_Y - 10; y += 60) {
                    for (let x = building.x + 15; x < building.x + building.width - 15; x += 40) {
                        const flicker = Math.random() > 0.7;
                        ctx.globalAlpha = flicker ? 1 : 0.3;
                        ctx.fillRect(x, y, 4, 6);
                    }
                }
                ctx.globalAlpha = 1;
            });
        }

        function checkAttackCollision(attacker, defender) {
            if (!attacker.isAttacking) return;

            const attackFrame = attacker.animationFrame % 2;
            let attackX, attackWidth;

            if (attacker.facingRight) {
                attackX = attacker.x + attacker.width;
                attackWidth = attackFrame === 1 ? 40 : 20;
            } else {
                attackX = attacker.x - (attackFrame === 1 ? 40 : 20);
                attackWidth = attackFrame === 1 ? 40 : 20;
            }

            if (attackX < defender.x + defender.width &&
                attackX + attackWidth > defender.x &&
                attacker.y + attacker.height / 2 < defender.y + defender.height &&
                attacker.y + attacker.height / 2 > defender.y) {
                
                defender.takeDamage(ATTACK_DAMAGE);
                attacker.isAttacking = false;
            }
        }

        function checkGameOver() {
            if (mecha1.hp <= 0) {
                endGame('PLAYER 2 WINS!');
            } else if (mecha2.hp <= 0) {
                endGame('PLAYER 1 WINS!');
            }
        }

        function endGame(winner) {
            winnerName.textContent = winner;
            gameOver.classList.add('show');
            gameRunning = false;
        }

        function restartGame() {
            mecha1 = new Mecha(100, GROUND_Y - 80, '#ff6b6b', 1);
            mecha2 = new Mecha(canvas.width - 150, GROUND_Y - 80, '#4ecdc4', 2);
            gameOver.classList.remove('show');
            gameRunning = true;
            gameLoop();
        }

        let mecha1 = new Mecha(100, GROUND_Y - 80, '#ff6b6b', 1);
        let mecha2 = new Mecha(canvas.width - 150, GROUND_Y - 80, '#4ecdc4', 2);
        let gameRunning = true;

        function gameLoop() {
            if (!gameRunning) return;

            drawBackground();
            mecha1.update(mecha2);
            mecha2.update(mecha1);
            checkAttackCollision(mecha1, mecha2);
            checkAttackCollision(mecha2, mecha1);
            mecha1.draw(ctx);
            mecha2.draw(ctx);
            checkGameOver();

            requestAnimationFrame(gameLoop);
        }

        window.addEventListener('keydown', (e) => {
            pressedKeys[e.code] = true;
            if (['Space', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Enter'].includes(e.code)) {
                e.preventDefault();
            }
        });

        window.addEventListener('keyup', (e) => {
            pressedKeys[e.code] = false;
        });

        gameLoop();
    </script>
</body>
</html>
