<section class="relative overflow-hidden rounded-[14px] border border-slate-700/40 bg-slate-950/55 px-3 py-3 backdrop-blur-md">
  <header class="mb-3 grid grid-cols-4 gap-2">
    <div class="game-kpi">
      <p class="text-[10px] uppercase tracking-[0.28em] text-slate-500">剩余时间</p>
      <p class="font-number text-base text-slate-50">01:28</p>
    </div>
    <div class="game-kpi">
      <p class="text-[10px] uppercase tracking-[0.28em] text-slate-500">目标数</p>
      <p class="font-number text-base text-slate-50">03 / 05</p>
    </div>
    <div class="game-kpi">
      <p class="text-[10px] uppercase tracking-[0.28em] text-slate-500">生命</p>
      <p class="font-number text-base text-emerald-300">82%</p>
    </div>
    <div class="game-kpi">
      <p class="text-[10px] uppercase tracking-[0.28em] text-slate-500">识别奖励</p>
      <p class="font-number text-base text-sky-300">+120</p>
    </div>
  </header>

  <div class="relative min-h-[280px] overflow-hidden rounded-[14px] border border-slate-600/30 bg-[linear-gradient(180deg,rgba(18,31,49,0.92),rgba(8,12,18,0.98))]">
    <div class="absolute inset-x-0 bottom-0 h-24 bg-[linear-gradient(180deg,transparent,rgba(5,8,12,0.96))]"></div>
    <div class="absolute bottom-0 left-3 h-28 w-16 rounded-t-[8px] border border-slate-600/30 bg-slate-800/65"></div>
    <div class="absolute bottom-0 left-20 h-36 w-20 rounded-t-[8px] border border-slate-600/30 bg-slate-900/70"></div>
    <div class="absolute bottom-0 right-16 h-32 w-16 rounded-t-[8px] border border-slate-600/30 bg-slate-800/60"></div>
    <div class="absolute left-1/2 top-1/2 h-40 w-40 -translate-x-1/2 -translate-y-1/2 rounded-full border border-sky-300/20"></div>
    <div class="absolute left-1/2 top-1/2 h-24 w-24 -translate-x-1/2 -translate-y-1/2 rounded-full border border-sky-300/35"></div>
    <div class="absolute left-1/2 top-1/2 h-px w-44 -translate-x-1/2 bg-sky-300/35"></div>
    <div class="absolute left-1/2 top-1/2 h-44 w-px -translate-y-1/2 bg-sky-300/35"></div>
    <div class="absolute right-20 top-20 h-4 w-4 rounded-full border border-rose-400/60 bg-rose-500/35"></div>
    <div class="absolute left-14 top-28 h-3 w-3 rounded-full border border-sky-300/50 bg-sky-400/25"></div>
    <div class="absolute bottom-12 right-10 rounded-full border border-emerald-400/40 px-2 py-1 text-[10px] uppercase tracking-[0.24em] text-emerald-300">
      弱点可见
    </div>
  </div>

  <footer class="mt-3 grid grid-cols-[1fr_auto] gap-3">
    <div class="game-panel flex items-center justify-between rounded-[14px] px-3 py-3">
      <div>
        <p class="text-[10px] uppercase tracking-[0.28em] text-slate-500">道具栏</p>
        <p class="mt-1 text-sm text-slate-200">扫描 / +15秒 / 放大 / 缩小</p>
      </div>
      <div class="game-chip font-number">ITEM 04</div>
    </div>
    <button class="game-btn-primary min-w-[108px]">开火</button>
  </footer>
</section>
