<!DOCTYPE html>
<html lang="zh-CN" class="light" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>结算成长</title>
    <style id="theme-vars">
:root {
  color-scheme: dark;
  --brand-prefix: game;
  --brand-primary: #71a8ff;
  --brand-primary-strong: #9bc4ff;
  --brand-primary-soft: rgba(113, 168, 255, 0.18);
  --surface-bg: #0f1620;
  --surface-panel: rgba(22, 32, 44, 0.94);
  --surface-panel-strong: rgba(26, 38, 53, 0.98);
  --surface-panel-soft: rgba(20, 30, 42, 0.76);
  --surface-card: rgba(28, 38, 51, 0.88);
  --surface-card-soft: rgba(24, 34, 46, 0.72);
  --surface-muted: #1c2633;
  --surface-border: rgba(135, 164, 206, 0.2);
  --surface-border-strong: rgba(113, 168, 255, 0.32);
  --text-primary: #edf3ff;
  --text-secondary: #98a6bd;
  --text-muted: #728098;
  --text-inverse: #0f1620;
  --state-success: #66d2b5;
  --state-warning: #f3c168;
  --state-error: #ff727f;
  --state-info: #8bc3ff;
  --overlay-scrim: rgba(7, 10, 15, 0.68);
  --glow-primary: 0 1px 0 rgba(255, 255, 255, 0.14) inset, 0 10px 24px rgba(12, 19, 30, 0.22);
  --glow-panel: 0 1px 0 rgba(255, 255, 255, 0.05) inset, 0 8px 22px rgba(8, 12, 20, 0.26);
  --shadow-floating: 0 16px 36px rgba(3, 7, 14, 0.28);
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-full: 9999px;
  --page-frame-width: 430px;
  --page-frame-height: 932px;
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  --font-title: "Microsoft YaHei UI", "PingFang SC", "Noto Sans SC", sans-serif;
  --font-body: "Microsoft YaHei UI", "PingFang SC", "Noto Sans SC", sans-serif;
  --font-number: "Consolas", "SFMono-Regular", "Roboto Mono", monospace;
}

.theme-dark {
  color-scheme: dark;
}

html,
body {
  margin: 0;
  height: 100%;
  min-height: 100%;
  background:
    radial-gradient(circle at 50% -6%, rgba(113, 168, 255, 0.26), transparent 28%),
    radial-gradient(circle at 50% 16%, rgba(166, 214, 255, 0.12), transparent 34%),
    linear-gradient(180deg, #121a25 0%, #101721 44%, #0d141d 100%);
  color: var(--text-primary);
  font-family: var(--font-body);
}

body {
  min-height: 100dvh;
  overflow-x: hidden;
}

.font-title {
  font-family: var(--font-title);
}

.font-body {
  font-family: var(--font-body);
}

.font-number {
  font-family: var(--font-number);
}

.game-safe-shell {
  position: relative;
  width: min(100%, var(--page-frame-width));
  max-width: var(--page-frame-width);
  height: var(--page-frame-height);
  min-height: var(--page-frame-height);
  margin: 0 auto;
  background:
    radial-gradient(circle at 50% 0%, rgba(126, 187, 255, 0.1), transparent 24%),
    linear-gradient(180deg, rgba(18, 26, 37, 0.96) 0%, rgba(15, 22, 32, 0.98) 100%);
  border-left: 1px solid rgba(128, 156, 196, 0.14);
  border-right: 1px solid rgba(128, 156, 196, 0.14);
  box-shadow: 0 0 0 1px rgba(128, 156, 196, 0.08), 0 22px 56px rgba(4, 7, 13, 0.4);
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.game-panel {
  background:
    linear-gradient(180deg, rgba(30, 41, 56, 0.92), rgba(22, 32, 44, 0.96));
  border: 1px solid var(--surface-border);
  border-radius: var(--radius-lg);
  box-shadow: var(--glow-panel);
}

.game-panel-strong {
  background:
    linear-gradient(180deg, rgba(38, 54, 73, 0.96), rgba(24, 35, 48, 0.98));
  border: 1px solid var(--surface-border-strong);
  border-radius: var(--radius-lg);
  box-shadow: var(--glow-primary);
}

.game-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  border-radius: 999px;
  border: 1px solid rgba(151, 182, 228, 0.16);
  background:
    linear-gradient(180deg, rgba(39, 53, 70, 0.92), rgba(26, 36, 49, 0.92));
  color: var(--text-secondary);
  font-size: 12px;
  letter-spacing: 0.03em;
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
}

.game-btn-primary,
.game-btn-secondary {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  font-weight: 700;
  letter-spacing: 0.03em;
  transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease;
}

.game-btn-primary {
  min-height: 50px;
  padding: 0 18px;
  border: 1px solid rgba(182, 216, 255, 0.34);
  border-radius: var(--radius-lg);
  background:
    linear-gradient(180deg, #8bc3ff 0%, #71a8ff 52%, #5f93ec 100%);
  color: #0f1b2c;
  box-shadow:
    inset 0 1px 0 rgba(255, 255, 255, 0.45),
    0 10px 20px rgba(36, 70, 123, 0.26);
}

.game-btn-secondary {
  min-height: 46px;
  padding: 0 16px;
  border-radius: var(--radius-lg);
  border: 1px solid rgba(143, 173, 214, 0.18);
  background:
    linear-gradient(180deg, rgba(45, 58, 75, 0.9), rgba(28, 39, 52, 0.94));
  color: var(--text-primary);
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
}

.game-btn-primary:hover,
.game-btn-secondary:hover {
  transform: translateY(-1px);
}

.game-grid-line {
  background-image:
    linear-gradient(rgba(129, 161, 203, 0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(129, 161, 203, 0.06) 1px, transparent 1px);
  background-size: 32px 32px;
}

.game-kpi {
  border-radius: var(--radius-md);
  border: 1px solid rgba(146, 175, 214, 0.14);
  background:
    linear-gradient(180deg, rgba(31, 42, 56, 0.9), rgba(24, 33, 45, 0.9));
  padding: 12px;
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
}

.game-divider {
  height: 1px;
  background: linear-gradient(90deg, transparent 0%, rgba(136, 167, 208, 0.28) 50%, transparent 100%);
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--brand-primary);
  }
  @layer base {
    body { background: var(--brand-background); color: var(--brand-foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="theme-dark bg-[var(--surface-bg)] text-[var(--text-primary)]">
  <div class="result-shell game-safe-shell">
    <header class="relative z-10">
      <section class="game-panel-strong soft-card px-4 py-5">
        <div class="flex items-start justify-between gap-3">
          <div>
            <p class="text-[11px] uppercase tracking-[0.32em] text-[#c9ddff]">任务结算</p>
            <h1 class="mt-1 text-2xl font-semibold">通关成功</h1>
            <p class="mt-2 text-sm leading-6 text-[var(--text-secondary)]">你已清除旧港高架伪装目标群，城市热区恢复稳定，新的成长入口已柔和开启。</p>
          </div>
          <div class="grade-pill px-3 py-2 text-right">
            <p class="text-[10px] uppercase tracking-[0.28em] text-[#b9e8da]">表现评分</p>
            <p class="font-number text-xl text-white">S</p>
          </div>
        </div>
      </section>
    </header>

    <main class="relative z-10 mt-4 space-y-4">
      <section class="game-panel soft-card px-4 py-4">
        <div class="flex items-center justify-between">
          <div>
            <p class="text-[11px] uppercase tracking-[0.28em] text-[var(--text-muted)]">结果反馈</p>
            <h2 class="mt-1 text-base font-semibold">作战表现总览</h2>
          </div>
          <div class="game-chip font-number">RUN 12-3</div>
        </div>
        <div class="mt-4 grid grid-cols-2 gap-3">
          <div class="game-kpi">
            <p class="text-[10px] uppercase tracking-[0.24em] text-[var(--text-muted)]">命中率</p>
            <p class="mt-1 font-number text-lg text-white">87%</p>
          </div>
          <div class="game-kpi">
            <p class="text-[10px] uppercase tracking-[0.24em] text-[var(--text-muted)]">剩余时间</p>
            <p class="mt-1 font-number text-lg text-[#a8cbff]">00:46</p>
          </div>
          <div class="game-kpi">
            <p class="text-[10px] uppercase tracking-[0.24em] text-[var(--text-muted)]">爆头率</p>
            <p class="mt-1 font-number text-lg text-[#ffd1d6]">54%</p>
          </div>
          <div class="game-kpi">
            <p class="text-[10px] uppercase tracking-[0.24em] text-[var(--text-muted)]">连击峰值</p>
            <p class="mt-1 font-number text-lg text-[#b9e8da]">x5</p>
          </div>
        </div>
      </section>

      <section class="game-panel soft-card px-4 py-4">
        <div class="flex items-center justify-between">
          <div>
            <p class="text-[11px] uppercase tracking-[0.28em] text-[var(--text-muted)]">奖励结算</p>
            <h2 class="mt-1 text-base font-semibold">金币与加成</h2>
          </div>
          <div class="text-sm text-[#f3d498]">可选择广告翻倍</div>
        </div>
        <div class="mt-4 space-y-3 text-sm">
          <div class="reward-row flex items-center justify-between px-3 py-3">
            <span class="text-[var(--text-secondary)]">基础金币</span>
            <span class="font-number text-[#f3d498]">+320</span>
          </div>
          <div class="reward-row flex items-center justify-between px-3 py-3">
            <span class="text-[var(--text-secondary)]">时间奖励</span>
            <span class="font-number text-[#a8cbff]">+95</span>
          </div>
          <div class="reward-row flex items-center justify-between px-3 py-3">
            <span class="text-[var(--text-secondary)]">广告翻倍</span>
            <span class="font-number text-white">可提升至 830</span>
          </div>
        </div>
      </section>

      <section class="game-panel-strong soft-card px-4 py-4">
        <div class="flex items-center justify-between">
          <div>
            <p class="text-[11px] uppercase tracking-[0.28em] text-[#c9ddff]">成长入口</p>
            <h2 class="mt-1 text-lg font-semibold">本次成长摘要</h2>
          </div>
          <div class="grade-pill px-3 py-2 text-center">
            <p class="text-[10px] uppercase tracking-[0.28em] text-[#b9e8da]">升级点</p>
            <p class="font-number text-base text-white">+2</p>
          </div>
        </div>
        <div class="mt-4 grid grid-cols-2 gap-3 text-sm">
          <div class="growth-item px-3 py-3">
            <p class="font-medium">弱点预测升级</p>
            <p class="mt-1 leading-6 text-[var(--text-secondary)]">高等级目标的弱点高亮时长延长 0.4 秒，提示更柔和但更稳定。</p>
          </div>
          <div class="growth-item px-3 py-3">
            <p class="font-medium">扫描冷却缩短</p>
            <p class="mt-1 leading-6 text-[var(--text-secondary)]">下一阶段战斗中，扫描道具恢复更快，方便连续观察。</p>
          </div>
        </div>
        <button class="game-btn-primary mt-4 w-full">进入升级</button>
      </section>

      <section class="grid grid-cols-2 gap-3">
        <button data-dom-id="back-main-menu" class="game-btn-secondary w-full">返回主页</button>
        <button data-dom-id="shortcut-retry-battle" class="game-btn-primary w-full">重试战斗</button>
      </section>
    </main>
  </div>

    <style>
      .result-shell {
        position: relative;
        min-height: 100%;
        height: 100%;
        max-width: 430px;
        margin: 0 auto;
        padding: calc(16px + env(safe-area-inset-top)) 16px calc(28px + env(safe-area-inset-bottom));
        box-sizing: border-box;
        overflow: hidden;
      }
      .result-shell::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at 50% 0%, rgba(113, 168, 255, 0.16), transparent 24%),
          linear-gradient(rgba(129, 161, 203, 0.05) 1px, transparent 1px),
          linear-gradient(90deg, rgba(129, 161, 203, 0.05) 1px, transparent 1px);
        background-size: auto, 32px 32px, 32px 32px;
        pointer-events: none;
      }
      .soft-card {
        position: relative;
        overflow: hidden;
      }
      .soft-card::after {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.04);
        pointer-events: none;
      }
      .reward-row,
      .growth-item {
        border-radius: 10px;
        border: 1px solid rgba(146, 175, 214, 0.14);
        background: linear-gradient(180deg, rgba(34, 47, 62, 0.94), rgba(24, 34, 45, 0.92));
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
      }
      .grade-pill {
        border-radius: 8px;
        border: 1px solid rgba(185, 232, 218, 0.24);
        background: rgba(102, 210, 181, 0.12);
      }
    </style>
</body>
</html>
