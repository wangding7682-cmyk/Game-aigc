<!DOCTYPE html>
<html lang="zh-CN" class="light" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PVP Mock房间</title>
    <style id="theme-vars">
:root {
  color-scheme: dark;
  --brand-prefix: game;
  --brand-primary: #71a8ff;
  --brand-primary-strong: #9bc4ff;
  --brand-primary-soft: rgba(113, 168, 255, 0.18);
  --surface-bg: #0f1620;
  --surface-panel: rgba(22, 32, 44, 0.94);
  --surface-panel-strong: rgba(26, 38, 53, 0.98);
  --surface-panel-soft: rgba(20, 30, 42, 0.76);
  --surface-card: rgba(28, 38, 51, 0.88);
  --surface-card-soft: rgba(24, 34, 46, 0.72);
  --surface-muted: #1c2633;
  --surface-border: rgba(135, 164, 206, 0.2);
  --surface-border-strong: rgba(113, 168, 255, 0.32);
  --text-primary: #edf3ff;
  --text-secondary: #98a6bd;
  --text-muted: #728098;
  --text-inverse: #0f1620;
  --state-success: #66d2b5;
  --state-warning: #f3c168;
  --state-error: #ff727f;
  --state-info: #8bc3ff;
  --overlay-scrim: rgba(7, 10, 15, 0.68);
  --glow-primary: 0 1px 0 rgba(255, 255, 255, 0.14) inset, 0 10px 24px rgba(12, 19, 30, 0.22);
  --glow-panel: 0 1px 0 rgba(255, 255, 255, 0.05) inset, 0 8px 22px rgba(8, 12, 20, 0.26);
  --shadow-floating: 0 16px 36px rgba(3, 7, 14, 0.28);
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-full: 9999px;
  --page-frame-width: 430px;
  --page-frame-height: 932px;
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  --font-title: "Microsoft YaHei UI", "PingFang SC", "Noto Sans SC", sans-serif;
  --font-body: "Microsoft YaHei UI", "PingFang SC", "Noto Sans SC", sans-serif;
  --font-number: "Consolas", "SFMono-Regular", "Roboto Mono", monospace;
}

.theme-dark {
  color-scheme: dark;
}

html,
body {
  margin: 0;
  height: 100%;
  min-height: 100%;
  background:
    radial-gradient(circle at 50% -6%, rgba(113, 168, 255, 0.26), transparent 28%),
    radial-gradient(circle at 50% 16%, rgba(166, 214, 255, 0.12), transparent 34%),
    linear-gradient(180deg, #121a25 0%, #101721 44%, #0d141d 100%);
  color: var(--text-primary);
  font-family: var(--font-body);
}

body {
  min-height: 100dvh;
  overflow-x: hidden;
}

.font-title {
  font-family: var(--font-title);
}

.font-body {
  font-family: var(--font-body);
}

.font-number {
  font-family: var(--font-number);
}

.game-safe-shell {
  position: relative;
  width: min(100%, var(--page-frame-width));
  max-width: var(--page-frame-width);
  height: var(--page-frame-height);
  min-height: var(--page-frame-height);
  margin: 0 auto;
  background:
    radial-gradient(circle at 50% 0%, rgba(126, 187, 255, 0.1), transparent 24%),
    linear-gradient(180deg, rgba(18, 26, 37, 0.96) 0%, rgba(15, 22, 32, 0.98) 100%);
  border-left: 1px solid rgba(128, 156, 196, 0.14);
  border-right: 1px solid rgba(128, 156, 196, 0.14);
  box-shadow: 0 0 0 1px rgba(128, 156, 196, 0.08), 0 22px 56px rgba(4, 7, 13, 0.4);
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.game-panel {
  background:
    linear-gradient(180deg, rgba(30, 41, 56, 0.92), rgba(22, 32, 44, 0.96));
  border: 1px solid var(--surface-border);
  border-radius: var(--radius-lg);
  box-shadow: var(--glow-panel);
}

.game-panel-strong {
  background:
    linear-gradient(180deg, rgba(38, 54, 73, 0.96), rgba(24, 35, 48, 0.98));
  border: 1px solid var(--surface-border-strong);
  border-radius: var(--radius-lg);
  box-shadow: var(--glow-primary);
}

.game-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  border-radius: 999px;
  border: 1px solid rgba(151, 182, 228, 0.16);
  background:
    linear-gradient(180deg, rgba(39, 53, 70, 0.92), rgba(26, 36, 49, 0.92));
  color: var(--text-secondary);
  font-size: 12px;
  letter-spacing: 0.03em;
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
}

.game-btn-primary,
.game-btn-secondary {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  font-weight: 700;
  letter-spacing: 0.03em;
  transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease;
}

.game-btn-primary {
  min-height: 50px;
  padding: 0 18px;
  border: 1px solid rgba(182, 216, 255, 0.34);
  border-radius: var(--radius-lg);
  background:
    linear-gradient(180deg, #8bc3ff 0%, #71a8ff 52%, #5f93ec 100%);
  color: #0f1b2c;
  box-shadow:
    inset 0 1px 0 rgba(255, 255, 255, 0.45),
    0 10px 20px rgba(36, 70, 123, 0.26);
}

.game-btn-secondary {
  min-height: 46px;
  padding: 0 16px;
  border-radius: var(--radius-lg);
  border: 1px solid rgba(143, 173, 214, 0.18);
  background:
    linear-gradient(180deg, rgba(45, 58, 75, 0.9), rgba(28, 39, 52, 0.94));
  color: var(--text-primary);
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
}

.game-btn-primary:hover,
.game-btn-secondary:hover {
  transform: translateY(-1px);
}

.game-grid-line {
  background-image:
    linear-gradient(rgba(129, 161, 203, 0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(129, 161, 203, 0.06) 1px, transparent 1px);
  background-size: 32px 32px;
}

.game-kpi {
  border-radius: var(--radius-md);
  border: 1px solid rgba(146, 175, 214, 0.14);
  background:
    linear-gradient(180deg, rgba(31, 42, 56, 0.9), rgba(24, 33, 45, 0.9));
  padding: 12px;
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
}

.game-divider {
  height: 1px;
  background: linear-gradient(90deg, transparent 0%, rgba(136, 167, 208, 0.28) 50%, transparent 100%);
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--brand-primary);
  }
  @layer base {
    body { background: var(--brand-background); color: var(--brand-foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="theme-dark bg-[var(--surface-bg)] text-[var(--text-primary)]">
  <div class="room-shell game-safe-shell">
    <header class="relative z-10 space-y-2">
      <div class="flex items-center justify-between">
        <div>
          <p class="text-[10px] uppercase tracking-[0.34em] text-[var(--text-muted)]">PVP Mock 房间</p>
          <h1 class="font-title text-[22px] font-semibold">PVP Mock 房间</h1>
        </div>
        <div class="game-chip font-number text-[#cfe3ff]">回合 04</div>
      </div>
      <div class="grid grid-cols-3 gap-1.5">
        <div class="game-chip justify-center px-2 py-2 text-[#b9e8da]">我方 2 命中</div>
        <div class="game-chip justify-center px-2 py-2 text-[#ffd1d6]">敌方 1 命中</div>
        <div class="game-chip justify-center px-2 py-2 text-[#b7d6ff]">Mock 裁定 已同步</div>
      </div>
    </header>

    <main class="relative z-10 mt-3 space-y-3">
      <section class="arena">
        <div class="absolute inset-x-0 top-0 h-24 bg-[linear-gradient(180deg,rgba(145,197,255,0.12),transparent)]"></div>
        <div class="absolute inset-x-0 bottom-0 h-28 bg-[linear-gradient(180deg,transparent,rgba(12,17,25,0.88))]"></div>

        <div class="cover left-3 h-26 w-14"></div>
        <div class="cover left-16 h-42 w-20"></div>
        <div class="cover left-[40%] h-34 w-18"></div>
        <div class="cover right-[24%] h-48 w-20"></div>
        <div class="cover right-5 h-28 w-16"></div>

        <div class="decal left-[23%] h-10 w-12"></div>
        <div class="decal right-[19%] h-14 w-12"></div>

        <div class="arena-ring"></div>
        <div class="cross absolute inset-0"></div>

        <div class="hit-mark left-[27%] top-[33%]"></div>
        <div class="hit-mark right-[20%] top-[41%]"></div>
        <div class="hit-mark left-[49%] top-[60%] -translate-x-1/2"></div>

        <div class="float-tag absolute left-4 top-5 rounded-full px-3 py-1 text-[11px] text-[#b9e8da]">姿势：探头中</div>
        <div class="float-tag absolute right-4 top-5 rounded-full px-3 py-1 text-[11px] text-[#d9e8ff]">当前裁定：等待我方提交</div>
        <div class="float-tag absolute left-4 top-14 rounded-[10px] px-2.5 py-1 text-[11px] text-[var(--text-secondary)]">命中记录：A1 命中护肩，敌方 B3 偏离半身位</div>
        <div class="float-tag absolute right-4 top-14 rounded-[10px] px-2.5 py-1 text-[11px] text-[#d9e8ff]">提示：保持探头姿势，瞄准中层掩体右沿</div>
        <div class="absolute left-[32%] top-[26%] rounded-[10px] border border-[rgba(102,210,181,0.24)] bg-[rgba(102,210,181,0.12)] px-2.5 py-1 text-[11px] text-[#c5f2e6]">我方落点 A2</div>
        <div class="absolute right-[16%] top-[32%] rounded-[10px] border border-[rgba(255,122,138,0.28)] bg-[rgba(255,114,127,0.12)] px-2.5 py-1 text-[11px] text-[#ffd1d6]">敌方掩体 C4</div>
        <div class="float-tag absolute bottom-6 left-1/2 -translate-x-1/2 rounded-full px-4 py-1.5 text-[11px] text-white">中部对战空间优先，信息轻量贴边浮出</div>
      </section>

      <div class="grid grid-cols-4 gap-2">
        <button data-dom-id="action-toggle-posture" class="game-btn-secondary text-sm">姿势切换</button>
        <button data-dom-id="action-submit-shot" class="game-btn-primary text-sm">提交射击</button>
        <button data-dom-id="action-disconnect" class="game-btn-secondary text-sm">断线</button>
        <button data-dom-id="back-main-menu" class="game-btn-secondary text-sm">返回主页</button>
      </div>

      <div class="hint-strip px-3 py-2 text-[11px] leading-5 text-[var(--text-secondary)]">
        <div class="flex items-start justify-between gap-3">
          <div class="min-w-0 flex-1">
            <span class="mr-2 rounded-full border border-[rgba(143,173,214,0.18)] px-2 py-0.5 text-[10px] uppercase tracking-[0.24em] text-[var(--text-muted)]">PC</span>
            观察态下拖动画面对位，双击左键进入瞄准；瞄准后按住 Shift、右键或 Space 屏息，左键或 Enter 提交射击。
          </div>
          <div class="min-w-0 flex-1 text-right">
            <span class="ml-2 mr-0 rounded-full border border-[rgba(151,198,255,0.24)] px-2 py-0.5 text-[10px] uppercase tracking-[0.24em] text-[#a8cbff]">移动端</span>
            双击打开放大镜；长按即屏息并可拖拽移动；松手后提交本次射击，滑走离开则取消当前放大镜阶段。
          </div>
        </div>
      </div>
    </main>
  </div>

    <style>
      .room-shell {
        position: relative;
        min-height: 100%;
        height: 100%;
        max-width: 430px;
        margin: 0 auto;
        padding: calc(12px + env(safe-area-inset-top)) 12px calc(18px + env(safe-area-inset-bottom));
        box-sizing: border-box;
        overflow: hidden;
      }
      .room-shell::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at 50% 0%, rgba(113, 168, 255, 0.14), transparent 22%),
          linear-gradient(rgba(129, 161, 203, 0.05) 1px, transparent 1px),
          linear-gradient(90deg, rgba(129, 161, 203, 0.05) 1px, transparent 1px);
        background-size: auto, 32px 32px, 32px 32px;
        pointer-events: none;
      }
      .arena {
        position: relative;
        min-height: 500px;
        overflow: hidden;
        border-radius: 12px;
        border: 1px solid rgba(143, 173, 214, 0.18);
        background:
          linear-gradient(180deg, rgba(58, 87, 122, 0.18) 0%, rgba(24, 36, 49, 0) 18%),
          linear-gradient(180deg, #223344 0%, #16202c 42%, #111923 100%);
      }
      .arena::before {
        content: "";
        position: absolute;
        inset: 12px;
        border-radius: 12px;
        border: 1px solid rgba(201, 224, 255, 0.08);
        pointer-events: none;
      }
      .cover {
        position: absolute;
        bottom: 0;
        border-radius: 12px 12px 6px 6px;
        border: 1px solid rgba(182, 209, 244, 0.12);
        background:
          linear-gradient(180deg, rgba(110, 138, 168, 0.28), rgba(70, 94, 119, 0.16) 30%, rgba(43, 58, 76, 0.95) 100%);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06), 0 10px 20px rgba(7, 12, 18, 0.22);
      }
      .decal {
        position: absolute;
        bottom: 20px;
        border-radius: 10px;
        border: 1px solid rgba(212, 190, 152, 0.16);
        background: linear-gradient(180deg, rgba(153, 121, 86, 0.55), rgba(98, 77, 53, 0.78));
      }
      .arena-ring,
      .arena-ring::before {
        position: absolute;
        content: "";
        border-radius: 999px;
        border: 1px solid rgba(151, 198, 255, 0.24);
      }
      .arena-ring {
        left: 50%;
        top: 50%;
        width: 204px;
        height: 204px;
        transform: translate(-50%, -50%);
      }
      .arena-ring::before {
        inset: 26px;
      }
      .cross::before,
      .cross::after {
        content: "";
        position: absolute;
        background: rgba(231, 241, 255, 0.72);
      }
      .cross::before {
        left: 50%;
        top: calc(50% - 92px);
        width: 1px;
        height: 184px;
        transform: translateX(-50%);
      }
      .cross::after {
        left: calc(50% - 92px);
        top: 50%;
        width: 184px;
        height: 1px;
        transform: translateY(-50%);
      }
      .hit-mark {
        position: absolute;
        width: 18px;
        height: 18px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        background: radial-gradient(circle, rgba(8, 14, 20, 0.96) 0 24%, rgba(255, 114, 127, 0.32) 25% 50%, transparent 51%);
      }
      .float-tag {
        border: 1px solid rgba(143, 173, 214, 0.18);
        background: rgba(17, 26, 36, 0.72);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
      }
      .hint-strip {
        border-radius: 12px;
        border: 1px solid rgba(143, 173, 214, 0.16);
        background: linear-gradient(180deg, rgba(30, 42, 56, 0.94), rgba(20, 28, 39, 0.94));
      }
    </style>
</body>
</html>
