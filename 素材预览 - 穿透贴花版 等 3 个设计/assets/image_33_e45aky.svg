<svg width="220" height="180" viewBox="0 0 220 180" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="wall-crack-corner-soft-title wall-crack-corner-soft-desc">
  <title id="wall-crack-corner-soft-title">软3D卡通墙体边角穿透裂损贴花</title>
  <desc id="wall-crack-corner-soft-desc">透明背景的边角穿透裂损贴花，缺角位置保留真实透明洞口，适合让墙后对象从边缘处透出。</desc>
