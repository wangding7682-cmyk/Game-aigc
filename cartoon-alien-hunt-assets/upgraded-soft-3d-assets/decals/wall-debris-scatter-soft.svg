      <stop offset="0.56" stop-color="#D79A62"/>
      <stop offset="1" stop-color="#8F5832"/>
    </linearGradient>
    <linearGradient id="debris-dark-grad" x1="62" y1="74" x2="152" y2="126" gradientUnits="userSpaceOnUse">
