<svg width="96" height="96" viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">时间延长图标</title>
  <desc id="desc">带红蓝 HUD 发光的计时强化图标，适用于延时道具。</desc>
  <defs>
    <linearGradient id="ringGrad" x1="23" y1="23" x2="73" y2="73" gradientUnits="userSpaceOnUse">
      <stop stop-color="#C7EEFF"/>
      <stop offset="0.4" stop-color="#6FD8FF"/>
      <stop offset="1" stop-color="#2A426A"/>
    </linearGradient>
    <radialGradient id="faceGrad" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(40 33) rotate(47) scale(34)">
      <stop stop-color="#193550"/>
      <stop offset="1" stop-color="#0A1624"/>
    </radialGradient>
    <filter id="shadow" x="10" y="12" width="76" height="76" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#06101A" flood-opacity="0.26"/>
    </filter>
  </defs>
  <g filter="url(#shadow)">
    <circle cx="48" cy="48" r="24" fill="url(#faceGrad)" stroke="url(#ringGrad)" stroke-width="5"/>
    <path d="M48 48V34" stroke="#EFFFFF" stroke-width="4.5" stroke-linecap="round"/>
    <path d="M48 48L60 54" stroke="#7EE5FF" stroke-width="4.5" stroke-linecap="round"/>
    <path d="M25 30L18 24" stroke="#FF667B" stroke-width="4" stroke-linecap="round"/>
    <path d="M71 30L78 24" stroke="#FF667B" stroke-width="4" stroke-linecap="round"/>
    <path d="M58 21C64 23 69 27 72 32" stroke="#FF667B" stroke-width="4" stroke-linecap="round"/>
    <path d="M36 21C30 23 25 27 22 32" stroke="#FF667B" stroke-width="4" stroke-linecap="round"/>
    <circle cx="48" cy="48" r="4.5" fill="#F6FFFF"/>
    <path d="M26 64C32 70 39 73 48 73C57 73 64 70 70 64" stroke="#65D9FF" stroke-width="4" stroke-linecap="round" opacity="0.72"/>
  </g>
</svg>
