<svg width="96" height="96" viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">扫描雷达图标</title>
  <desc id="desc">带冷蓝扫描脉冲的软3D雷达图标，适用于 HUD 扫描能力。</desc>
  <defs>
    <radialGradient id="panelGrad" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(36 28) rotate(46) scale(44)">
      <stop stop-color="#183B56"/>
      <stop offset="1" stop-color="#0A1624"/>
    </radialGradient>
    <radialGradient id="waveGrad" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(48 48) scale(28)">
      <stop stop-color="#BBFFFF" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#56D6FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="10" y="10" width="76" height="76" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#08111B" flood-opacity="0.28"/>
    </filter>
  </defs>
  <g filter="url(#shadow)">
    <circle cx="48" cy="48" r="24" fill="url(#panelGrad)" stroke="#5FCFFF" stroke-width="4"/>
    <circle cx="48" cy="48" r="17" stroke="#7BE5FF" stroke-width="3" opacity="0.7"/>
    <circle cx="48" cy="48" r="9" stroke="#A8F3FF" stroke-width="3" opacity="0.8"/>
    <path d="M48 48L66 35" stroke="#E6FFFF" stroke-width="4" stroke-linecap="round"/>
    <path d="M48 48L58 60" stroke="#59D7FF" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
    <circle cx="48" cy="48" r="5" fill="#D4FFFF"/>
    <circle cx="65" cy="34" r="4" fill="#FF5D75"/>
    <circle cx="48" cy="48" r="26" fill="url(#waveGrad)" opacity="0.75"/>
  </g>
</svg>
